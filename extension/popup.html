<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>10X Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f7f7f5;
      color: #37352f;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: #191919;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-10 { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -1px; line-height: 1; }
    .logo-x  { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1; }
    .logo-studio { font-size: 12px; font-weight: 400; color: #666; margin-left: 3px; }

    .body { padding: 14px; }

    /* Profile card */
    .profile-card {
      background: white;
      border: 1px solid #e9e9e7;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      display: none;
    }
    .profile-card.visible { display: block; }
    .profile-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .avatar-placeholder {
      width: 36px; height: 36px; border-radius: 6px;
      background: #000; display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 700;
      font-size: 16px; flex-shrink: 0;
    }
    .avatar-img {
      width: 36px; height: 36px; border-radius: 6px;
      object-fit: cover; border: 1px solid #e9e9e7; flex-shrink: 0;
    }
    .profile-name  { font-weight: 600; font-size: 13px; color: #37352f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-email { font-size: 11px; color: #9b9a97; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-pub   { font-size: 11px; color: #37352f; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Stats */
    .stats-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .stat {
      flex: 1; background: #f7f7f5; border: 1px solid #e9e9e7;
      border-radius: 6px; padding: 8px; text-align: center;
    }
    .stat-value { font-weight: 700; font-size: 17px; color: #000; }
    .stat-label { font-size: 10px; color: #9b9a97; margin-top: 2px; }

    /* Expiry */
    .expiry-bar {
      border-radius: 5px; padding: 6px 10px;
      font-size: 11px; font-weight: 500; margin-bottom: 0;
    }
    .expiry-ok     { background: #e6f4ea; color: #0d7c3d; border: 1px solid #bbf7d0; }
    .expiry-warn   { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .expiry-danger { background: #fff0f0; color: #eb5757; border: 1px solid #fbd0d0; }

    /* Status card */
    .status-card {
      background: white; border: 1px solid #e9e9e7;
      border-radius: 8px; padding: 12px; margin-bottom: 12px;
    }
    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: #0d7c3d; box-shadow: 0 0 5px rgba(13,124,61,.4); }
    .dot-red    { background: #eb5757; }
    .dot-yellow { background: #fbbf24; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-label { font-size: 13px; font-weight: 600; color: #37352f; }
    .status-sub   { font-size: 11px; color: #9b9a97; margin-top: 1px; }

    /* Buttons */
    .btn {
      width: 100%; padding: 9px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all .1s; display: flex; align-items: center;
      justify-content: center; gap: 6px; font-family: inherit;
      border: 1px solid #e9e9e7;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn + .btn   { margin-top: 6px; }
    .btn-primary  { background: #000; color: #fff; border-color: #000; }
    .btn-primary:hover:not(:disabled) { background: #222; }
    .btn-secondary { background: white; color: #37352f; }
    .btn-secondary:hover:not(:disabled) { background: #f7f7f5; }
    .btn-danger   { background: #fff0f0; color: #eb5757; border-color: #fbd0d0; }
    .btn-danger:hover:not(:disabled) { background: #ffe0e0; }
    .btn-ghost    { background: transparent; color: #9b9a97; border: 1px dashed #e9e9e7; font-size: 11px; padding: 6px; }
    .btn-ghost:hover { background: #f1f1ef; color: #37352f; }

    /* Form */
    .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #9b9a97; margin-bottom: 5px; display: block; }
    .input {
      width: 100%; padding: 7px 10px; border: 1px solid #e9e9e7;
      border-radius: 6px; font-size: 12px; font-family: monospace;
      background: white; color: #37352f; outline: none;
      transition: border-color .1s;
    }
    .input:focus { border-color: #aaa; }

    .note    { font-size: 11px; color: #9b9a97; line-height: 1.5; margin-top: 10px; }
    .note a  { color: #37352f; font-weight: 500; text-decoration: none; }
    .note a:hover { text-decoration: underline; }
    .error   { background: #fff0f0; border: 1px solid #fbd0d0; color: #eb5757; font-size: 11px; padding: 8px 10px; border-radius: 6px; margin-top: 10px; line-height: 1.4; }
    .success { background: #e6f4ea; border: 1px solid #bbf7d0; color: #0d7c3d; font-size: 11px; padding: 8px 10px; border-radius: 6px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo-10">10</span><span class="logo-x">X</span>
    <span class="logo-studio">Studio</span>
  </div>

  <div class="body">
    <div style="margin-bottom:12px">
      <label class="label">URL de tu 10X Studio</label>
      <input type="text" id="appUrl" class="input" placeholder="http://localhost:3000" />
    </div>

    <!-- Profile card (connected) -->
    <div class="profile-card" id="profileCard">
      <div class="profile-top">
        <div id="avatarWrap"></div>
        <div style="flex:1;min-width:0">
          <div class="profile-name"  id="profileName"></div>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-pub"   id="profilePub"></div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-value" id="statSubs">—</div><div class="stat-label">Suscriptores</div></div>
        <div class="stat"><div class="stat-value" id="statDays">—</div><div class="stat-label">Días sesión</div></div>
      </div>
      <div class="expiry-bar" id="expiryBar"></div>
    </div>

    <!-- Status card (disconnected / loading) -->
    <div class="status-card" id="statusCard">
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <div>
          <div class="status-label" id="statusLabel">Verificando...</div>
          <div class="status-sub"   id="statusSub"></div>
        </div>
      </div>
    </div>

    <!-- Actions disconnected -->
    <div id="actionConnect">
      <p class="note" style="margin-bottom:10px">
        Asegúrate de estar logueado en <a href="https://substack.com" target="_blank">substack.com</a> en este Chrome.
      </p>
      <button class="btn btn-primary" id="btnConnect">→ Conectar Substack</button>
      <button class="btn btn-ghost"   id="btnDebug">🔍 Ver cookies disponibles</button>
    </div>

    <!-- Actions connected -->
    <div id="actionConnected" style="display:none">
      <button class="btn btn-secondary" id="btnRefresh">↺ Actualizar sesión</button>
      <button class="btn btn-danger"    id="btnDisconnect">Desconectar</button>
    </div>

    <div id="msgBox"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
